<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帰り道のメンタルケア・チャットボット</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome (for icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* カスタムスクロールバー & アニメーション */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.3);
            border-radius: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gradient-to-tr from-indigo-100 via-purple-50 to-pink-100 min-h-screen flex flex-col justify-between font-sans text-gray-800">

    <!-- ヘッダー -->
    <header class="bg-white/80 backdrop-blur-md border-b border-purple-100 sticky top-0 z-10 py-4 px-6 flex items-center justify-between shadow-sm">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-500 rounded-full flex items-center justify-center text-white shadow-md">
                <i class="fa-solid fa-mug-hot text-lg"></i>
            </div>
            <div>
                <h1 class="font-bold text-gray-800 tracking-wide text-base sm:text-lg">寄り道メンタルケア</h1>
                <p class="text-xs text-purple-500 flex items-center">
                    <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse mr-1.5"></span>
                    お疲れ様のチャットボット
                </p>
            </div>
        </div>
        <button id="reset-btn" class="text-xs font-semibold px-3 py-1.5 rounded-full border border-purple-200 text-purple-600 hover:bg-purple-50 transition-colors flex items-center gap-1">
            <i class="fa-solid fa-rotate-left"></i> 最初から
        </button>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-1 max-w-2xl w-full mx-auto p-4 flex flex-col justify-between overflow-hidden">
        
        <!-- チャット表示エリア -->
        <div id="chat-box" class="chat-container flex-1 overflow-y-auto space-y-4 py-4 px-2 pr-4 mb-4 min-h-[350px] max-h-[calc(100vh-220px)]">
            <!-- 動的にメッセージが追加されます -->
        </div>

        <!-- ユーザー入力エリア (下部に固定) -->
        <div id="input-area" class="bg-white/90 backdrop-blur-md rounded-2xl p-4 shadow-lg border border-purple-100 transition-all duration-300">
            <!-- 選択ボタン用のコンテナ (状態選択用 & ボリューム選択用) -->
            <div id="choice-container" class="hidden grid grid-cols-2 gap-2 sm:grid-cols-3 md:grid-cols-5 mb-2">
                <!-- JavaScriptで動的にボタン選択肢を生成 -->
            </div>

            <!-- テキスト入力用（セクション5用） -->
            <div id="text-input-container" class="hidden flex items-center space-x-2">
                <input type="text" id="free-text-input" placeholder="ここに入力してください..." class="flex-1 px-4 py-3 rounded-xl border border-purple-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-sm transition-all bg-purple-50/30">
                <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-3 rounded-xl transition-all shadow-md shadow-indigo-100 flex items-center gap-2">
                    <span>送信</span>
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- フッター -->
    <footer class="py-3 text-center text-xs text-purple-400 border-t border-purple-50/50 bg-white/30 backdrop-blur-sm">
        &copy; 寄り道メンタルケア. 心地よい帰り道になりますように。
    </footer>

    <script>
        // 5通り（状態）× 3通り（ボリューム）= 15パターンの詳細マトリクスデータ
        const foodDatabase = {
            "tired": { // 疲れた
                "heavy": {
                    title: "ふわサクっ！メロンパン",
                    store: "ローソン",
                    icon: "fa-bread-slice",
                    iconColor: "text-amber-600 bg-amber-50",
                    tag: "菓子パン",
                    recommendation: "今日は疲労がたまってるんだね。それなら、ローソンの「ふわサクっ！メロンパン」をおすすめするよ。疲労に対しては糖分や炭水化物の摂取が効果的とされているから、牛乳と合わせてまずはゆっくりする時間を作ろう。"
                },
                "light": {
                    title: "窯出しとろけるプリン",
                    store: "ファミリーマート",
                    icon: "fa-cookie",
                    iconColor: "text-yellow-600 bg-yellow-50",
                    tag: "スイーツ",
                    recommendation: "今日は疲労がたまってるんだね。それなら、ファミリーマートの「窯出しとろけるプリン」をおすすめするよ。疲労に対しては糖やたんぱく質の摂取が効果的とされているから、家に帰って温かいお茶とプリンでティータイムにしよう。"
                },
                "drink": {
                    title: "1食分の鉄分が摂れる ココア",
                    store: "ローソン",
                    icon: "fa-mug-hot",
                    iconColor: "text-amber-800 bg-amber-100/50",
                    tag: "ドリンク",
                    recommendation: "今日は疲労がたまってるんだね。それなら、ローソンの「1食分の鉄分が摂れる ココア」をおすすめするよ。疲労に対しては糖や鉄分の摂取が効果的とされているから、帰り道に飲みながらまずはリラックスしてみよう。"
                }
            },
            "tense": { // 緊張した
                "heavy": {
                    title: "石臼挽きそば粉のざるそば定食",
                    store: "ファミリーマート",
                    icon: "fa-bowl-food",
                    iconColor: "text-emerald-700 bg-emerald-50",
                    tag: "めん類・お弁当",
                    recommendation: "今日は緊張したんだね。それなら、ファミリーマートの「石臼挽きそば粉のざるそば定食」をおすすめするよ。そばにはマグネシウムやセロトニンが多く含まれていて、鉄分もたくさん入っているんだ。それらは精神を落ち着かせる効果があるから、食べやすいそばはピッタリな食品なんだ。涼しい部屋で健康な食事を食べよう。"
                },
                "light": {
                    title: "もちもち食感クレープ チョコバナナ",
                    store: "セブンイレブン",
                    icon: "fa-stroopwafel",
                    iconColor: "text-yellow-600 bg-yellow-50",
                    tag: "スイーツ",
                    recommendation: "今日は緊張したんだね。それなら、セブンイレブンの「もちもち食感クレープ チョコバナナ」をおすすめするよ。マグネシウムやセロトニンには、精神を落ち着かせる効果があるんだ。また、トリプトファンには安眠を助ける効果もあるから、今日は家に帰ってゆっくり休もう。"
                },
                "drink": {
                    title: "キッコーマン豆乳飲料",
                    store: "どこでも",
                    icon: "fa-glass-water",
                    iconColor: "text-green-600 bg-green-50",
                    tag: "パックドリンク",
                    recommendation: "今日は緊張したんだね。それなら、「キッコーマンの豆乳飲料」をおすすめするよ。大豆に多く含まれているマグネシウムには、精神を落ち着かせる効果があるんだ。色んな味があるから、好きな味を選んで、飲みながら帰っちゃおう。"
                }
            },
            "stressed": { // ストレスがたまった
                "heavy": {
                    title: "ソースたっぷり生パスタ カルボナーラ",
                    store: "ローソン",
                    icon: "fa-plate-wheat",
                    iconColor: "text-yellow-700 bg-amber-50",
                    tag: "パスタ",
                    recommendation: "今日はストレスが溜まってるようだね。それなら、ローソンの「ソースたっぷり生パスタ カルボナーラ」をおすすめするよ。この商品に多く含まれる乳酸菌はストレス回復や精神安定、腸内環境を安定させることに高い効果を持っている上に、たんぱく質や炭水化物がエネルギーに変わって、元気をチャージしてくれるよ。"
                },
                "light": {
                    title: "たっぷりフルーツのしろくま",
                    store: "ファミリーマート",
                    icon: "fa-ice-cream",
                    iconColor: "text-cyan-600 bg-cyan-50",
                    tag: "アイス",
                    recommendation: "今日はストレスが溜まってるようだね。それなら、ファミリーマートの「たっぷりフルーツのしろくま」をおすすめするよ。この商品に含まれる乳酸菌やビタミンＣはストレス回復や精神安定に高い効果を持っている上に、他にも様々なビタミンが含まれているから、ピッタリな商品なんだ。夏バテやちょっと暑い日のご褒美にしよう。"
                },
                "drink": {
                    title: "ヨーグルトスムージー アサイーボウル",
                    store: "ローソン",
                    icon: "fa-blender",
                    iconColor: "text-purple-600 bg-purple-50",
                    tag: "スムージー",
                    recommendation: "今日はストレスが溜まってるようだね。それなら、ローソンの「ヨーグルトスムージー アサイーボウル」をおすすめするよ。この商品に含まれる乳酸菌やビタミンＣはストレス回復や精神安定に高い効果を持っている上に、他にも様々なビタミンが含まれているから、ピッタリな商品んだ。甘い飲み物と深呼吸で、一旦落ち着いてみよう。"
                }
            },
            "sluggish": { // 体がだるい
                "heavy": {
                    title: "濃厚トマトソースの大きなピザパン",
                    store: "セブンイレブン",
                    icon: "fa-pizza-slice",
                    iconColor: "text-red-600 bg-red-50",
                    tag: "惣菜パン",
                    recommendation: "今日は体がだるいみたいだね。それなら、セブンイレブンの「濃厚トマトソースの大きなピザパン」をおすすめするよ。体のだるさは脳のエネルギー不足や寝不足が原因かも。炭水化物は脳に効率的にエネルギーを与えることができるし、ちょっと重そうだけどトマトソースの酸味で思ったよりも食べやすいはずだよ。飲み物と一緒にちょっとしたピザパーティー気分だ！"
                },
                "light": {
                    title: "ザクほろシュー（チョコクリーム）",
                    store: "ファミリーマート",
                    icon: "fa-cubes",
                    iconColor: "text-amber-800 bg-amber-50",
                    tag: "シュークリーム",
                    recommendation: "今日は体がだるいみたいだね。それなら、ファミリーマートの「ザクほろシュー（チョコクリーム）」をおすすめするよ。体のだるさは脳のエネルギー不足や寝不足が原因かも。糖分は脳に効率的にエネルギーを与えることができるし、チョコレートは疲労に効きやすいとされているんだ。今日の疲れを取るためにも、残りの時間はゆっくり休もう。"
                },
                "drink": {
                    title: "のむヨーグルト",
                    store: "ファミリーマート",
                    icon: "fa-bottle-water",
                    iconColor: "text-blue-500 bg-blue-50",
                    tag: "乳飲料",
                    recommendation: "今日は体がだるいみたいだね。それなら、ファミリーマートの「のむヨーグルト」をおすすめするよ。体のだるさは脳のエネルギー不足や寝不足が原因かも。糖分は脳に効率的にエネルギーを与えることができるし、乳酸菌は体の調子を整えてくれるんだ。今日の疲れを取るためにも、好きな味を選んで、残りの時間はゆっくり休もう。"
                }
            },
            "fine": { // 問題なし
                "heavy": {
                    title: "ファミチキ（骨なし）",
                    store: "ファミリーマート",
                    icon: "fa-drumstick-bite",
                    iconColor: "text-orange-600 bg-orange-50",
                    tag: "ホットスナック",
                    recommendation: "今日は元気なんだね！それなら自分へのご褒美として、ファミリーマートの「ファミチキ（骨なし）」をおすすめするよ。今日を頑張った自分へのご褒美として、おいしいものを食べることは、元気を長続きさせるために効果的なんだ。でも、食べすぎは逆に体に悪影響が出ちゃうから、ほどほどにね。"
                },
                "light": {
                    title: "こだわりのフィナンシェ",
                    store: "ファミリーマート",
                    icon: "fa-cookie-bite",
                    iconColor: "text-yellow-700 bg-amber-50",
                    tag: "焼き菓子",
                    recommendation: "今日は元気なんだね！それなら自分へのご褒美として、ファミリーマートの「こだわりのフィナンシェ」をおすすめするよ。今日を頑張った自分へのご褒美として、おいしいものを食べることは、元気を長続きさせるために効果的なんだ。"
                },
                "drink": {
                    title: "セブンカフェ",
                    store: "セブンイレブン",
                    icon: "fa-mug-saucer",
                    iconColor: "text-gray-700 bg-gray-50",
                    tag: "淹れたてコーヒー",
                    recommendation: "今日は元気なんだね！それなら自分へのご褒美として、セブンイレブンの「セブンカフェ」をおすすめするよ。今日を頑張った自分へのご褒美として、好きな飲み物を飲むことは、元気を長続きさせるために効果的なんだ。でも、カフェインの過剰摂取は眠りが浅くなったり頭痛に繋がったりするから、ほどほどにね。"
                }
            }
        };

        // セクション2の選択肢（今日の状態）
        const stateChoices = [
            { id: "tired", text: "疲れた", icon: "fa-battery-empty", color: "from-amber-400 to-orange-500" },
            { id: "tense", text: "緊張した", icon: "fa-bolt", color: "from-teal-400 to-emerald-500" },
            { id: "stressed", text: "ストレスがたまった", icon: "fa-brain", color: "from-pink-400 to-rose-500" },
            { id: "sluggish", text: "体がだるい", icon: "fa-cloud-rain", color: "from-blue-400 to-indigo-500" },
            { id: "fine", text: "問題なし", icon: "fa-face-smile", color: "from-green-400 to-teal-500" }
        ];

        // セクション3の選択肢（ボリューム選択）
        const volumeChoices = [
            { id: "heavy", text: "しっかり食べられる", icon: "fa-utensils", color: "from-indigo-500 to-blue-600" },
            { id: "light", text: "軽く食べられる", icon: "fa-ice-cream", color: "from-purple-500 to-pink-500" },
            { id: "drink", text: "飲み物", icon: "fa-glass-water", color: "from-teal-500 to-cyan-500" }
        ];

        // 各種DOM要素
        const chatBox = document.getElementById("chat-box");
        const choiceContainer = document.getElementById("choice-container");
        const textInputContainer = document.getElementById("text-input-container");
        const freeTextInput = document.getElementById("free-text-input");
        const sendBtn = document.getElementById("send-btn");
        const resetBtn = document.getElementById("reset-btn");

        // ボットのメッセージ出力用の遅延
        const botDelay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // メッセージ生成関数
        function createMessageElement(sender, content, extraClass = "") {
            const wrapper = document.createElement("div");
            wrapper.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in ${extraClass}`;

            const isBot = sender === 'bot';
            
            // アイコン
            const iconHtml = isBot 
                ? `<div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center text-white text-xs shadow-sm flex-shrink-0">
                     <i class="fa-solid fa-mug-hot"></i>
                   </div>`
                : '';

            const bubbleClass = isBot
                ? 'bg-white text-gray-800 rounded-2xl rounded-tl-sm shadow-md border border-purple-50/50'
                : 'bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-2xl rounded-tr-sm shadow-md';

            wrapper.innerHTML = `
                <div class="flex items-start space-x-2 max-w-[85%]">
                    ${iconHtml}
                    <div class="${bubbleClass} p-3.5 text-sm leading-relaxed whitespace-pre-line">
                        ${content}
                    </div>
                </div>
            `;
            return wrapper;
        }

        // 入力中インジケータ (タイピング風)
        function createTypingIndicator() {
            const wrapper = document.createElement("div");
            wrapper.id = "typing-indicator";
            wrapper.className = "flex justify-start animate-fade-in";
            wrapper.innerHTML = `
                <div class="flex items-start space-x-2 max-w-[85%]">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center text-white text-xs shadow-sm flex-shrink-0 animate-pulse">
                        <i class="fa-solid fa-mug-hot"></i>
                    </div>
                    <div class="bg-white rounded-2xl rounded-tl-sm shadow-sm border border-purple-50/50 p-4 flex items-center space-x-1">
                        <div class="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                        <div class="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 0.15s"></div>
                        <div class="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
                    </div>
                </div>
            `;
            return wrapper;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById("typing-indicator");
            if (indicator) indicator.remove();
        }

        // スクロールを最下部に移動
        function scrollToBottom() {
            chatBox.scrollTo({
                top: chatBox.scrollHeight,
                behavior: 'smooth'
            });
        }

        // 状態管理
        let selectedState = null;
        let selectedVolume = null;

        // 【セクション1：導入】
        async function startSession() {
            chatBox.innerHTML = "";
            selectedState = null;
            selectedVolume = null;
            hideAllInputs();

            chatBox.appendChild(createTypingIndicator());
            scrollToBottom();
            await botDelay(1000);
            removeTypingIndicator();

            // 導入のメッセージ
            const welcomeMsg = `まずはお疲れ様。呼吸を整えて軽くリラックスしてみよう。`;
            chatBox.appendChild(createMessageElement('bot', welcomeMsg));
            scrollToBottom();

            await botDelay(1200);
            
            // 【セクション2：今日の状態を選択】へ移行
            chatBox.appendChild(createTypingIndicator());
            scrollToBottom();
            await botDelay(800);
            removeTypingIndicator();

            chatBox.appendChild(createMessageElement('bot', "今の気分や、体の様子はどんな感じかな？\n一番あてはまるものを選んでみてね。"));
            showStateChoices();
            scrollToBottom();
        }

        // 【セクション2】今日の状態の選択ボタンを表示
        function showStateChoices() {
            hideAllInputs();
            choiceContainer.innerHTML = "";
            choiceContainer.classList.remove("hidden");
            // 5つの選択肢用にグリッドを最適化
            choiceContainer.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2 mb-2";

            stateChoices.forEach(choice => {
                const btn = document.createElement("button");
                btn.className = `flex flex-col items-center justify-center p-3 rounded-xl border border-purple-100 bg-white hover:bg-purple-50 hover:border-purple-300 transition-all duration-300 active:scale-95 shadow-sm hover:shadow-md text-gray-700`;
                btn.onclick = () => handleStateSelect(choice.id, choice.text);
                btn.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br ${choice.color} flex items-center justify-center text-white mb-1.5 shadow-sm">
                        <i class="fa-solid ${choice.icon} text-base"></i>
                    </div>
                    <span class="text-xs font-bold">${choice.text}</span>
                `;
                choiceContainer.appendChild(btn);
            });
        }

        // 状態が選択されたとき
        async function handleStateSelect(stateId, stateText) {
            selectedState = stateId;
            hideAllInputs();

            // ユーザー側のチャットを表示
            chatBox.appendChild(createMessageElement('user', stateText));
            scrollToBottom();

            await botDelay(800);

            // 【セクション3：食事のボリュームを選択】へ移行
            chatBox.appendChild(createTypingIndicator());
            scrollToBottom();
            await botDelay(1000);
            removeTypingIndicator();

            chatBox.appendChild(createMessageElement('bot', "今の食欲や食べたい量はどうかな？\n以下の3つから選んでね。"));
            showVolumeChoices();
            scrollToBottom();
        }

        // 【セクション3】ボリュームの選択ボタンを表示
        function showVolumeChoices() {
            hideAllInputs();
            choiceContainer.innerHTML = "";
            choiceContainer.classList.remove("hidden");
            // 3つの選択肢用にグリッドを変更
            choiceContainer.className = "grid grid-cols-3 gap-2 mb-2";

            volumeChoices.forEach(choice => {
                const btn = document.createElement("button");
                btn.className = `flex flex-col items-center justify-center p-4 rounded-xl border border-purple-100 bg-white hover:bg-purple-50 hover:border-purple-300 transition-all duration-300 active:scale-95 shadow-sm hover:shadow-md text-gray-700`;
                btn.onclick = () => handleVolumeSelect(choice.id, choice.text);
                btn.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br ${choice.color} flex items-center justify-center text-white mb-1.5 shadow-sm">
                        <i class="fa-solid ${choice.icon} text-base"></i>
                    </div>
                    <span class="text-xs font-bold">${choice.text}</span>
                `;
                choiceContainer.appendChild(btn);
            });
        }

        // ボリュームが選択されたとき
        async function handleVolumeSelect(volumeId, volumeText) {
            selectedVolume = volumeId;
            hideAllInputs();

            // ユーザー側のチャットを表示
            chatBox.appendChild(createMessageElement('user', volumeText));
            scrollToBottom();

            await botDelay(800);

            // 【セクション4：食品の提案】へ移行
            chatBox.appendChild(createTypingIndicator());
            scrollToBottom();
            await botDelay(1500);
            removeTypingIndicator();

            // データベースから該当食品を取得
            const food = foodDatabase[selectedState][selectedVolume];
            
            // 食品提案カードの作成 (テキスト＆おやつアイコンスタイル)
            const cardHtml = `
                <div class="font-sans">
                    <div class="mb-3">${food.recommendation}</div>
                    
                    <!-- 提案カードUI -->
                    <div class="bg-gradient-to-br from-white to-purple-50/40 border border-purple-100 rounded-xl overflow-hidden shadow-sm mt-3 p-4 flex items-center space-x-4">
                        <!-- 商品をイメージしたアイコン表示エリア -->
                        <div class="w-16 h-16 rounded-xl flex items-center justify-center text-2xl shadow-inner ${food.iconColor} flex-shrink-0">
                            <i class="fa-solid ${food.icon}"></i>
                        </div>
                        
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="bg-indigo-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">
                                    <i class="fa-solid fa-store mr-0.5"></i> ${food.store}
                                </span>
                                <span class="text-[10px] text-gray-400 font-medium">${food.tag}</span>
                            </div>
                            <h3 class="font-bold text-gray-800 text-sm sm:text-base truncate">
                                ${food.title}
                            </h3>
                            <div class="flex items-center gap-1.5 mt-2 text-[11px] text-purple-600">
                                <span class="bg-purple-100/50 rounded-full px-2 py-0.5 font-medium">
                                    #調子を整える
                                </span>
                                <span class="bg-pink-100/50 rounded-full px-2 py-0.5 font-medium">
                                    #寄り道おやつ
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            chatBox.appendChild(createMessageElement('bot', cardHtml));
            scrollToBottom();

            await botDelay(2000);

            // 【セクション5：一日の振り返り】へ移行
            chatBox.appendChild(createTypingIndicator());
            scrollToBottom();
            await botDelay(1000);
            removeTypingIndicator();

            const questionMsg = `最後に、今日良かったことを一つだけ教えて。どんな小さなことでも大丈夫だよ。`;
            chatBox.appendChild(createMessageElement('bot', questionMsg));
            showTextInput();
            scrollToBottom();
        }

        // テキスト入力の表示
        function showTextInput() {
            hideAllInputs();
            textInputContainer.classList.remove("hidden");
            freeTextInput.value = "";
            freeTextInput.focus();
        }

        // すべての入力パネルを一時非表示にする
        function hideAllInputs() {
            choiceContainer.classList.add("hidden");
            textInputContainer.classList.add("hidden");
        }

        // 振り返りテキストの送信
        async function handleFreeTextSubmit() {
            const text = freeTextInput.value.trim();
            if (!text) return;

            hideAllInputs();

            // ユーザー回答の追加
            chatBox.appendChild(createMessageElement('user', text));
            scrollToBottom();

            await botDelay(1000);

            chatBox.appendChild(createTypingIndicator());
            scrollToBottom();
            await botDelay(1500);
            removeTypingIndicator();

            // 温かいフィードバック
            const reactions = [
                `素敵だね！そんな風に良かったことを見つけられるって、素晴らしいことだよ。\n教えてくれてありがとう。`,
                `小さな喜びを大切にできるの、とても素敵。その調子でゆっくり休んで、良い夜を過ごしてね。`,
                `日常の小さなハッピーに目を向けられたこと、それだけで今日一日が素晴らしいものになるね。\nよくがんばったね。`,
                `些細なことでも、それを見つけるだけで心が少し温かくなるよね。今日のご褒美と一緒に、幸せな気持ちで眠りにつけますように。`
            ];
            
            const randomReaction = reactions[Math.floor(Math.random() * reactions.length)];
            const closingMsg = `${randomReaction}\n\n帰り道、足元に気をつけて帰ってね。おいしいおやつと一緒に、今夜はゆっくり自分を癒してあげて。`;

            chatBox.appendChild(createMessageElement('bot', closingMsg));
            
            // ケア完了カード
            await botDelay(1000);
            chatBox.appendChild(createMessageElement('bot', `
                <div class="text-center p-3 bg-gradient-to-br from-indigo-50 to-pink-50 rounded-xl border border-purple-100 shadow-inner">
                    <p class="text-xs text-indigo-500 font-semibold">🍀 今日のケアセッション完了 🍀</p>
                    <p class="text-[11px] text-gray-500 mt-1">またリラックスしたくなったらいつでも話しかけてね。</p>
                </div>
            `));
            
            scrollToBottom();
        }

        // 送信イベントの設定
        sendBtn.onclick = handleFreeTextSubmit;
        freeTextInput.onkeydown = (e) => {
            if (e.key === 'Enter') {
                handleFreeTextSubmit();
            }
        };

        resetBtn.onclick = () => {
            if(confirm("セッションをリセットして最初からやり直しますか？")) {
                startSession();
            }
        };

        // 初期セッション開始
        window.onload = () => {
            startSession();
        };
    </script>
</body>
</html>
